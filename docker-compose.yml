version: "3.9"

services:

  app:
    build: .
    container_name: blogg_app
    ports:
      - "3001:3001"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: blogdb

  mysql:
    image: mysql:8
    container_name: blogg_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: blogdb
    ports:
      - "3307:3306"
      
volumes:
  mysql_data: