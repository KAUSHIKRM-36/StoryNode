version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bloggweb_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-Kaushik@03}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blogging_platform}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Kaushik@03}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: bloggweb_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Kaushik@03}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blogging_platform}
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-cr7-Goat_prod_secret_key_123}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    command: npm start

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
